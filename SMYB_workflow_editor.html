<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SMYB Workflow Editor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0c0c10;color:#e2e2e8;height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* ── TOPBAR ──────────────────────────────────────────── */
#topbar{height:48px;background:#14141a;border-bottom:1px solid #22222e;display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;z-index:200}
.brand{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#fff;white-space:nowrap;flex-shrink:0}
.brand-icon{width:26px;height:26px;background:linear-gradient(135deg,#5c4ec9,#7B68EE);border-radius:6px;display:flex;align-items:center;justify-content:center}
.brand-icon svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.sep{width:1px;height:18px;background:#22222e;flex-shrink:0;margin:0 2px}
.flow-name{font-size:12px;font-weight:500;color:#8080a0;padding:4px 8px;border-radius:5px;cursor:text;border:1px solid transparent;background:transparent;font-family:inherit;min-width:120px}
.flow-name:focus{outline:none;border-color:#33334a;background:#1a1a24;color:#e2e2e8}
.tbtn-row{display:flex;gap:3px;flex:1;overflow-x:auto;scrollbar-width:none}
.tbtn-row::-webkit-scrollbar{display:none}
.ftab{padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid transparent;color:#555;background:transparent;font-family:inherit;white-space:nowrap;transition:all .1s}
.ftab:hover{background:#1a1a22;color:#aaa}
.ftab.act{background:#1e1e28;border-color:#30303e;color:#e2e2e8;font-weight:500}
.ftab-add{padding:4px 8px;border-radius:5px;font-size:12px;cursor:pointer;border:1px solid #25253a;color:#555;background:transparent;font-family:inherit;transition:all .1s}
.ftab-add:hover{color:#9C86FF;border-color:#4a4a70}
.top-actions{display:flex;gap:5px;flex-shrink:0;margin-left:auto}
.tbtn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #25252e;color:#8080a0;background:transparent;font-family:inherit;transition:all .1s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.tbtn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tbtn:hover{background:#1a1a24;color:#e2e2e8}
.tbtn.primary{background:#4f3cc9;border-color:#4f3cc9;color:#fff}
.tbtn.primary:hover{background:#6b55e0}
.tbtn.danger{color:#e05555}
.tbtn.danger:hover{background:#2a1a1a;border-color:#5a2020}
.tbtn.run-on{background:#1a3d28;border-color:#2a6040;color:#10B981}

/* ── LAYOUT ──────────────────────────────────────────── */
#layout{flex:1;display:flex;overflow:hidden}

/* ── LEFT PANEL ─ Node Palette ───────────────────────── */
#palette{width:200px;background:#11111a;border-right:1px solid #1e1e28;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#palette.collapsed{width:0;border-right:none}
.pal-hdr{padding:10px 12px 8px;border-bottom:1px solid #1a1a24;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#33334a}
.pal-body{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin}
.pal-section{margin-bottom:12px}
.pal-section-title{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#2e2e46;margin-bottom:5px;padding:0 2px}
.pal-node{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:7px;border:1px solid #1e1e2c;background:#16161e;cursor:grab;transition:all .12s;margin-bottom:3px}
.pal-node:hover{border-color:#3a3a58;background:#1c1c28;transform:translateX(2px)}
.pal-node:active{cursor:grabbing}
.pal-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pal-icon svg{width:14px;height:14px;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;fill:none}
.pal-label{font-size:11px;font-weight:500;color:#9090a8;line-height:1.2}
.pal-sub{font-size:9px;color:#404058;margin-top:1px}

/* ── CANVAS ──────────────────────────────────────────── */
#canvas-outer{flex:1;overflow:auto;position:relative;background:#0c0c10;background-image:radial-gradient(circle,rgba(255,255,255,.05) 1px,transparent 1px);background-size:24px 24px;cursor:default;-webkit-overflow-scrolling:touch}
#canvas-outer.panning{cursor:grabbing}
#canvas{position:relative;min-width:1400px;min-height:700px}
#svg-layer{position:absolute;inset:0;pointer-events:none;overflow:visible;width:100%;height:100%}
/* in-progress connection line */
#conn-preview{position:absolute;inset:0;pointer-events:none;overflow:visible}

/* ── NODES ───────────────────────────────────────────── */
.wf-node{position:absolute;background:#1c1c24;border:1px solid #2c2c38;border-radius:10px;cursor:move;display:flex;align-items:center;padding:10px 12px 10px 10px;gap:9px;z-index:10;transition:border-color .12s,box-shadow .12s;touch-action:none}
.wf-node:hover{border-color:#4a47a0;box-shadow:0 0 0 1px rgba(90,87,180,.2),0 4px 20px rgba(0,0,0,.5)}
.wf-node.sel{border-color:#4faaff;box-shadow:0 0 0 2px rgba(79,170,255,.2),0 4px 20px rgba(0,0,0,.5)}
.wf-node.connecting-from{border-color:#9C86FF;box-shadow:0 0 0 2px rgba(156,134,255,.3)}
.wf-node.agent-node{background:#181822;border-color:#2a2a3e}
.wf-node.agent-node:hover{border-color:#7B68EE}
.wf-node.agent-node.sel{border-color:#7B68EE;box-shadow:0 0 0 2px rgba(123,104,238,.3)}
.rf-badge{position:absolute;top:-9px;left:10px;background:#0d2240;border:1px solid #1a4a7a;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:600;color:#4faaff;letter-spacing:.3px;display:flex;align-items:center;gap:4px;pointer-events:none}
.rf-dot{width:5px;height:5px;background:#4faaff;border-radius:50%}
.node-icon{width:36px;height:36px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.node-icon svg{width:17px;height:17px;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;fill:none}
.node-text{flex:1;min-width:0}
.node-title{font-size:12px;font-weight:600;color:#dcdce4;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-sub{font-size:9px;color:#40405a;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.port{position:absolute;width:13px;height:13px;background:#0c0c10;border:2px solid #3a3a50;border-radius:50%;top:50%;transform:translateY(-50%);z-index:30;cursor:crosshair;transition:border-color .1s,transform .1s}
.port:hover{border-color:#9C86FF;transform:translateY(-50%) scale(1.3)}
.port-in{left:-7px}
.port-out{right:-7px}
.node-del{position:absolute;top:-8px;right:-8px;width:18px;height:18px;background:#2a1a1a;border:1px solid #5a2020;border-radius:50%;color:#e05555;font-size:11px;line-height:17px;text-align:center;cursor:pointer;display:none;z-index:40;font-family:inherit}
.wf-node.sel .node-del{display:block}
.node-del:hover{background:#3a1a1a}
.elabel{position:absolute;font-size:9px;color:#333348;font-weight:600;letter-spacing:.3px;pointer-events:none;background:#0c0c10;padding:0 3px;z-index:5;text-transform:lowercase}

/* ── RIGHT PANEL ─ Properties ────────────────────────── */
#props{width:260px;background:#11111a;border-left:1px solid #1e1e28;display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
#props.hidden{width:0;border-left:none;overflow:hidden}
.props-hdr{padding:12px 14px 10px;border-bottom:1px solid #1a1a24;display:flex;align-items:center;justify-content:space-between}
.props-title{font-size:11px;font-weight:600;color:#5050688;font-weight:600;color:#e2e2e8}
.props-close{background:none;border:none;color:#444;cursor:pointer;font-size:16px;line-height:1;padding:0 2px}
.props-body{flex:1;overflow-y:auto;padding:12px 14px;scrollbar-width:thin}
.field-group{margin-bottom:14px}
.field-label{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#33334a;margin-bottom:5px;display:block}
.field-input{width:100%;background:#181820;border:1px solid #252535;border-radius:6px;color:#e2e2e8;font-size:12px;padding:7px 9px;font-family:inherit;transition:border-color .1s;resize:none}
.field-input:focus{outline:none;border-color:#4a47a0}
.field-select{width:100%;background:#181820;border:1px solid #252535;border-radius:6px;color:#e2e2e8;font-size:12px;padding:7px 9px;font-family:inherit;cursor:pointer;appearance:none}
.field-select:focus{outline:none;border-color:#4a47a0}
.type-picker{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.type-opt{padding:6px 8px;border-radius:6px;border:1px solid #1e1e2c;background:#14141e;cursor:pointer;font-size:10px;font-weight:500;color:#505068;text-align:center;transition:all .1s;display:flex;align-items:center;gap:5px;justify-content:center}
.type-opt:hover{border-color:#3a3a58;color:#9090b0}
.type-opt.selected{color:#fff;border-color:currentColor}
.props-actions{padding:10px 14px 14px;border-top:1px solid #1a1a24;display:flex;flex-direction:column;gap:6px}
.btn-full{width:100%;padding:8px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid;font-family:inherit;transition:all .1s}
.btn-apply{background:#4f3cc9;border-color:#4f3cc9;color:#fff}
.btn-apply:hover{background:#6b55e0}
.btn-delete{background:transparent;border-color:#3a2020;color:#c05050}
.btn-delete:hover{background:#1e1010;border-color:#7a3030}
.connect-hint{padding:8px 14px;font-size:11px;color:#404060;text-align:center;border-bottom:1px solid #1a1a24;line-height:1.5}
.connect-hint strong{color:#9C86FF}

/* ── EMPTY STATE ─────────────────────────────────────── */
.empty-canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.empty-canvas p{font-size:13px;color:#222232;line-height:1.8}

/* ── CONTEXT MENU ────────────────────────────────────── */
#ctx-menu{position:fixed;background:#1a1a24;border:1px solid #2e2e3e;border-radius:8px;padding:4px;z-index:1000;display:none;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.ctx-item{padding:7px 12px;font-size:12px;color:#9090a8;cursor:pointer;border-radius:5px;display:flex;align-items:center;gap:8px}
.ctx-item:hover{background:#252535;color:#e2e2e8}
.ctx-item svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.ctx-sep{height:1px;background:#22222e;margin:3px 0}
.ctx-item.danger{color:#c05050}
.ctx-item.danger:hover{background:#1e1010}

/* ── MODAL ───────────────────────────────────────────── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center}
#modal-overlay.show{display:flex}
#modal{background:#1a1a24;border:1px solid #2e2e3e;border-radius:12px;padding:22px;width:320px;max-width:90vw;box-shadow:0 16px 48px rgba(0,0,0,.7)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;color:#e2e2e8}
.modal-body{display:flex;flex-direction:column;gap:12px}
.modal-actions{display:flex;gap:8px;margin-top:18px}
.modal-btn{flex:1;padding:8px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid;font-family:inherit}
.modal-cancel{background:transparent;border-color:#2e2e3e;color:#7070888}
.modal-cancel:hover{background:#1e1e2c}
.modal-confirm{background:#4f3cc9;border-color:#4f3cc9;color:#fff}
.modal-confirm:hover{background:#6b55e0}

/* ── TOAST ───────────────────────────────────────────── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#252535;border:1px solid #35354a;border-radius:8px;padding:8px 16px;font-size:12px;color:#a0a0b8;z-index:1000;transition:transform .25s ease,opacity .25s;opacity:0;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── SCROLLBAR ───────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e1e2c;border-radius:3px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="brand">
    <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
    SMYB
  </div>
  <div class="sep"></div>
  <input class="flow-name" id="flow-name" value="Inbound Agent" title="Rinomina workflow">
  <div class="sep"></div>
  <div class="tbtn-row" id="tab-row"></div>
  <button class="ftab-add" onclick="addFlow()" title="Nuovo workflow">+ Flusso</button>
  <div class="sep"></div>
  <div class="top-actions">
    <button class="tbtn" onclick="toggleRun()" id="run-btn" title="Esegui simulazione">
      <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Run
    </button>
    <button class="tbtn" onclick="togglePalette()" title="Mostra/nascondi palette">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
    <button class="tbtn" onclick="clearCanvas()" title="Svuota canvas" class="danger">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    </button>
    <button class="tbtn primary" onclick="saveAll()" title="Salva">
      <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Salva
    </button>
  </div>
</div>

<!-- LAYOUT -->
<div id="layout">

  <!-- LEFT: Palette -->
  <div id="palette">
    <div class="pal-hdr">Nodi disponibili</div>
    <div class="pal-body" id="pal-body"></div>
  </div>

  <!-- CENTER: Canvas -->
  <div id="canvas-outer">
    <svg id="conn-preview" style="position:absolute;inset:0;pointer-events:none;overflow:visible;width:100%;height:100%"></svg>
    <div id="canvas">
      <svg id="svg-layer" style="position:absolute;inset:0;pointer-events:none;overflow:visible;width:100%;height:100%"></svg>
    </div>
    <div class="empty-canvas" id="empty-msg">
      <p>Trascina un nodo dalla palette<br>o clicca destro sul canvas per aggiungerne uno</p>
    </div>
  </div>

  <!-- RIGHT: Properties -->
  <div id="props" class="hidden">
    <div class="props-hdr">
      <span class="props-title">Proprietà nodo</span>
      <button class="props-close" onclick="closeProps()">×</button>
    </div>
    <div class="connect-hint">Clicca <strong>○</strong> su un nodo per iniziare una connessione, poi clicca <strong>○</strong> sul nodo di destinazione</div>
    <div class="props-body" id="props-body"></div>
    <div class="props-actions" id="props-actions"></div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxAddNode()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Aggiungi nodo qui</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxSelectAll()"><svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>Seleziona tutti</div>
  <div class="ctx-item" onclick="saveAll()"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/></svg>Salva flusso</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="clearCanvas()"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>Svuota canvas</div>
</div>

<!-- ADD NODE MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-title">Nuovo nodo</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-cancel" onclick="closeModal()">Annulla</button>
      <button class="modal-btn modal-confirm" onclick="confirmAddNode()">Aggiungi</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════
   DATA & CONFIG
══════════════════════════════════════════════════════ */
const ICONS = {
  tr:    `<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/>`,
  ag:    `<path d="M12 2C8.5 2 6 4.5 6 8c0 2 1 3.8 2.5 5H8l-2 4h12l-2-4h-.5C17 11.8 18 10 18 8c0-3.5-2.5-6-6-6z"/><line x1="9" y1="17" x2="15" y2="17"/>`,
  ac:    `<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5.64 5.64l2.12 2.12M16.24 16.24l2.12 2.12M5.64 18.36l2.12-2.12M16.24 7.76l2.12-2.12"/>`,
  dt:    `<ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v5c0 1.66 3.58 3 8 3s8-1.34 8-3V6"/><path d="M4 11v5c0 1.66 3.58 3 8 3s8-1.34 8-3v-5"/>`,
  de:    `<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>`,
  ou:    `<polyline points="20 6 9 17 4 12"/>`,
  agent: `<rect x="4" y="7" width="16" height="10" rx="2"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><line x1="9" y1="16" x2="15" y2="16"/><line x1="12" y1="3" x2="12" y2="7"/><circle cx="12" cy="3" r="1.3"/>`,
  mem:   `<rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="6" x2="6" y2="18"/><line x1="10" y1="6" x2="10" y2="18"/><line x1="14" y1="6" x2="14" y2="18"/><line x1="18" y1="6" x2="18" y2="18"/>`,
  wh:    `<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>`,
  gps:   `<circle cx="12" cy="12" r="3"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>`,
  mail:  `<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>`,
  pdf:   `<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>`,
};
const TYPE_COLOR = {tr:'#FF784F',ag:'#9C86FF',ac:'#5090F8',dt:'#08BDD9',de:'#F59E0B',ou:'#10B981',agent:'#9C86FF',mem:'#08BDD9',wh:'#25D366',gps:'#4faaff',mail:'#FF784F',pdf:'#FF4444'};
const TYPE_LABEL = {tr:'Trigger',ag:'AI Model',ac:'Azione',dt:'Dati / DB',de:'Decisione',ou:'Output',agent:'ReadyFlow Agent',mem:'Memoria',wh:'WhatsApp',gps:'GPS Track',mail:'Email',pdf:'PDF Report'};

const PALETTE_ITEMS = [
  { section:'Trigger', items:[
    {t:'tr', icon:'tr',  label:'Trigger Cron',  sub:'schedule'},
    {t:'tr', icon:'tr',  label:'Webhook',        sub:'webhook'},
    {t:'tr', icon:'wh',  label:'Telegram Trig.', sub:'message'},
  ]},

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
function portOut(n){ return {x:n.x+n.w, y:n.y+n.h/2}; }
function portIn(n){  return {x:n.x,     y:n.y+n.h/2}; }
function bezier(s,d){
  const c=Math.min(Math.max(Math.abs(d.x-s.x)*.45,55),180);
  return `M${s.x} ${s.y} C${s.x+c} ${s.y} ${d.x-c} ${d.y} ${d.x} ${d.y}`;
}

function renderAll(){
  const flow = currentFlow();
  const canvas = document.getElementById('canvas');
  const svgL   = document.getElementById('svg-layer');
  canvas.querySelectorAll('.wf-node,.elabel').forEach(e=>e.remove());
  svgL.innerHTML='';

  document.getElementById('empty-msg').style.display = flow.nodes.length===0 ? 'block' : 'none';
  document.getElementById('flow-name').value = flow.name;

  // SVG defs + edges
  let svgHtml = `<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

  flow.edges.forEach((e,i)=>{
    const src=getNode(e.f), dst=getNode(e.t);
    if(!src||!dst) return;
    const s=portOut(src), d=portIn(dst);
    const bz=bezier(s,d);
    const col=e.suc?'#10B981':'#252538';
    svgHtml+=`<path id="ep${e.id}" d="${bz}" fill="none" stroke="${col}" stroke-width="1.8" marker-end="url(#ar)"/>`;
    if(e.lbl){
      const mx=(s.x+d.x)/2, my=(s.y+d.y)/2;
      const lbl=document.createElement('div');
      lbl.className='elabel';
      lbl.textContent=e.lbl;
      lbl.style.left=(mx-12)+'px';
      lbl.style.top=(my-7)+'px';
      lbl.style.color=e.suc?'#10B981':'#333348';
      canvas.appendChild(lbl);
    }
    if(running){
      const dotCol=e.suc?'#10B981':'#9C86FF';
      svgHtml+=`<circle r="4.5" fill="${dotCol}" opacity="0.92">
        <animateMotion dur="${1.4+i*.25}s" repeatCount="indefinite" begin="${i*.12}s">
          <mpath href="#ep${e.id}"/></animateMotion></circle>`;
    }
  });
  svgL.innerHTML = svgHtml;

  // Nodes
  flow.nodes.forEach(n=>{
    const ic = n.t==='mem'?'mem':(n.agent?'agent':(ICONS[n.t]?n.t:'ac'));
    const el = document.createElement('div');
    el.className='wf-node'+(n.agent?' agent-node':'')+(n.id===selectedNodeId?' sel':'');
    el.dataset.id=n.id;
    el.style.cssText=`left:${n.x}px;top:${n.y}px;width:${n.w}px;height:${n.h}px`;
    el.innerHTML=`
      ${n.agent?'<div class="rf-badge"><div class="rf-dot"></div>ReadyFlow</div>':''}
      <div class="port port-in" data-nid="${n.id}" data-side="in"></div>
      <div class="node-icon ic-${n.agent?'agent':n.t}" style="background:${TYPE_COLOR[n.t]||'#555'}22">
        <svg viewBox="0 0 24 24" style="stroke:${TYPE_COLOR[n.t]||'#999'}">${ICONS[ic]||ICONS.ac}</svg>
      </div>
      <div class="node-text">
        <div class="node-title">${n.label}</div>
        <div class="node-sub">${n.sub}</div>
      </div>
      <div class="port port-out" data-nid="${n.id}" data-side="out"></div>
      <div class="node-del" data-nid="${n.id}" title="Elimina nodo">×</div>`;
    attachNodeEvents(el, n);
    canvas.appendChild(el);
  });
}

/* ══════════════════════════════════════════════════════
   DRAG NODES
══════════════════════════════════════════════════════ */
function attachNodeEvents(el, n){
  // Drag
  el.addEventListener('pointerdown', e=>{
    if(e.target.classList.contains('port')||e.target.classList.contains('node-del')) return;
    e.stopPropagation();
    selectNode(n.id);
    const rect=el.getBoundingClientRect();
    const outer=document.getElementById('canvas-outer');
    const ox=e.clientX-rect.left, oy=e.clientY-rect.top;
    dragState={id:n.id, ox, oy};
    el.setPointerCapture(e.pointerId);
    document.getElementById('canvas-outer').style.overflow='hidden';
  });
  el.addEventListener('pointermove', e=>{
    if(!dragState||dragState.id!==n.id) return;
    const outer=document.getElementById('canvas-outer');
    const outerRect=outer.getBoundingClientRect();
    const nx=Math.max(0,e.clientX-outerRect.left-dragState.ox+outer.scrollLeft);
    const ny=Math.max(0,e.clientY-outerRect.top-dragState.oy+outer.scrollTop);
    n.x=Math.round(nx); n.y=Math.round(ny);
    el.style.left=n.x+'px'; el.style.top=n.y+'px';
    redrawEdges();
  });
  el.addEventListener('pointerup', e=>{
    if(dragState&&dragState.id===n.id){ dragState=null; document.getElementById('canvas-outer').style.overflow='auto'; }
  });
  // Port click — connect
  el.querySelectorAll('.port').forEach(p=>{
    p.addEventListener('click', e=>{
      e.stopPropagation();
      const nid=p.dataset.nid, side=p.dataset.side;
      if(!connectingFrom){
        if(side==='out'){ connectingFrom=nid; el.classList.add('connecting-from'); showToast('Ora clicca la porta di ingresso del nodo destinazione'); }
      } else {
        if(side==='in' && nid!==connectingFrom){
          addEdge(connectingFrom, nid);
          cancelConnect();
        } else { cancelConnect(); }
      }
    });
  });
  // Delete btn
  el.querySelector('.node-del').addEventListener('click', e=>{
    e.stopPropagation();
    deleteNode(n.id);
  });
}

function cancelConnect(){
  connectingFrom=null;
  document.querySelectorAll('.wf-node.connecting-from').forEach(e=>e.classList.remove('connecting-from'));
  document.getElementById('conn-preview').innerHTML='';
}

/* Track mouse for connection preview */
document.getElementById('canvas-outer').addEventListener('mousemove', e=>{
  if(!connectingFrom) return;
  const outer=document.getElementById('canvas-outer');
  const rect=outer.getBoundingClientRect();
  const mx=e.clientX-rect.left+outer.scrollLeft;
  const my=e.clientY-rect.top+outer.scrollTop;
  const src=getNode(connectingFrom);
  if(!src) return;
  const s=portOut(src);
  const c=Math.max(Math.abs(mx-s.x)*.45,55);
  const d=`M${s.x} ${s.y} C${s.x+c} ${s.y} ${mx-c} ${my} ${mx} ${my}`;
  document.getElementById('conn-preview').innerHTML=`<path d="${d}" fill="none" stroke="#9C86FF" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7"/>
    <circle cx="${mx}" cy="${my}" r="4" fill="#9C86FF" opacity="0.6"/>`;
});

/* ══════════════════════════════════════════════════════
   REDRAW EDGES ONLY (during drag)
══════════════════════════════════════════════════════ */
function redrawEdges(){
  const flow=currentFlow();
  const svgL=document.getElementById('svg-layer');
  const canvas=document.getElementById('canvas');
  canvas.querySelectorAll('.elabel').forEach(e=>e.remove());
  let svgHtml=`<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;
  flow.edges.forEach((e,i)=>{
    const src=getNode(e.f),dst=getNode(e.t);
    if(!src||!dst) return;
    const s=portOut(src),d=portIn(dst);
    const col=e.suc?'#10B981':'#252538';
    svgHtml+=`<path id="ep${e.id}" d="${bezier(s,d)}" fill="none" stroke="${col}" stroke-width="1.8" marker-end="url(#ar)"/>`;
    if(e.lbl){
      const lbl=document.createElement('div');
      lbl.className='elabel';
      lbl.textContent=e.lbl;
      lbl.style.left=((s.x+d.x)/2-12)+'px';
      lbl.style.top=((s.y+d.y)/2-7)+'px';
      lbl.style.color=e.suc?'#10B981':'#333348';
      canvas.appendChild(lbl);
    }
    if(running){
      svgHtml+=`<circle r="4.5" fill="${e.suc?'#10B981':'#9C86FF'}" opacity="0.92">
        <animateMotion dur="${1.4+i*.25}s" repeatCount="indefinite" begin="${i*.12}s">
          <mpath href="#ep${e.id}"/></animateMotion></circle>`;
    }
  });
  svgL.innerHTML=svgHtml;
}

function buildTypePicker(current){
  const types=[
    {t:'tr',label:'Trigger'},{t:'agent',label:'Agent'},{t:'ag',label:'AI Model'},
    {t:'ac',label:'Azione'},{t:'dt',label:'Dati'},{t:'de',label:'Decisione'},
    {t:'ou',label:'Output'},{t:'mem',label:'Memoria'},{t:'wh',label:'WhatsApp'},
    {t:'pdf',label:'PDF'},{t:'gps',label:'GPS'},{t:'mail',label:'Email'},
  ];
  return types.map(tp=>`
    <div class="type-opt ${tp.t===current?'selected':''}" data-t="${tp.t}"
      style="${tp.t===current?`color:${TYPE_COLOR[tp.t]||'#9C86FF'};border-color:${TYPE_COLOR[tp.t]||'#9C86FF'}`:''}"
      onclick="selectType(this,'${tp.t}')">
      <svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2">${ICONS[tp.t]||ICONS.ac}</svg>
      ${tp.label}
    </div>`).join('');
}

function selectType(el,t){
  document.querySelectorAll('.type-opt').forEach(o=>{
    o.classList.remove('selected');
    o.style.color=''; o.style.borderColor='';
  });
  el.classList.add('selected');
  el.style.color=TYPE_COLOR[t]||'#9C86FF';
  el.style.borderColor=TYPE_COLOR[t]||'#9C86FF';
  el.dataset.selected=t;
}

function applyProps(id){
  const n=getNode(id);
  if(!n) return;
  n.label=document.getElementById('pf-label').value||n.label;
  n.sub=document.getElementById('pf-sub').value||n.sub;
  n.detail=document.getElementById('pf-detail').value;
  n.agent=document.getElementById('pf-agent').checked;
  const selType=document.querySelector('.type-opt.selected');
  if(selType) n.t=selType.dataset.t||selType.dataset.selected||n.t;
  renderAll();
  selectNode(id);
  showToast('Modifiche applicate');
}

function closeProps(){
  document.getElementById('props').classList.add('hidden');
  selectedNodeId=null;
  document.querySelectorAll('.wf-node').forEach(e=>e.classList.remove('sel'));
}

/* ══════════════════════════════════════════════════════
   ADD / DELETE NODES & EDGES
══════════════════════════════════════════════════════ */
function addNode(x, y, t, label, sub){
  const id='n'+Date.now();
  const isAgent=t==='agent';
  const node={
    id, x:Math.round(x), y:Math.round(y),
    w:isAgent?230:185, h:isAgent?72:58,
    t, label:label||TYPE_LABEL[t]||'Nodo',
    sub:sub||'custom', detail:'', agent:isAgent
  };
  currentFlow().nodes.push(node);
  renderAll();
  selectNode(id);
  showToast('Nodo aggiunto');
  return id;
}

function deleteNode(id){
  const flow=currentFlow();
  flow.nodes=flow.nodes.filter(n=>n.id!==id);
  flow.edges=flow.edges.filter(e=>e.f!==id&&e.t!==id);
  if(selectedNodeId===id){ closeProps(); }
  renderAll();
  showToast('Nodo eliminato');
}

function addEdge(fromId, toId){
  // Avoid duplicates
  const flow=currentFlow();
  if(flow.edges.find(e=>e.f===fromId&&e.t===toId)) return;
  const id='e'+Date.now();
  flow.edges.push({id, f:fromId, t:toId, lbl:'', suc:false});
  renderAll();
  showToast('Connessione creata');
}

/* ══════════════════════════════════════════════════════
   DRAG FROM PALETTE
══════════════════════════════════════════════════════ */
function initPalette(){
  const body=document.getElementById('pal-body');
  body.innerHTML='';
  PALETTE_ITEMS.forEach(sec=>{
    const s=document.createElement('div');
    s.className='pal-section';
    s.innerHTML=`<div class="pal-section-title">${sec.section}</div>`;
    sec.items.forEach(item=>{
      const d=document.createElement('div');
      d.className='pal-node';
      d.draggable=true;
      d.innerHTML=`
        <div class="pal-icon" style="background:${TYPE_COLOR[item.t]||'#555'}22">
          <svg viewBox="0 0 24 24" style="stroke:${TYPE_COLOR[item.t]||'#999'};fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round">${ICONS[item.icon]||ICONS.ac}</svg>
        </div>
        <div><div class="pal-label">${item.label}</div><div class="pal-sub">${item.sub}</div></div>`;
      d.addEventListener('dragstart', e=>{
        e.dataTransfer.setData('node-type', item.t);
        e.dataTransfer.setData('node-label', item.label);
        e.dataTransfer.setData('node-sub', item.sub);
      });
      s.appendChild(d);
    });
    body.appendChild(s);
  });
}

// Drop on canvas
document.getElementById('canvas-outer').addEventListener('dragover', e=>e.preventDefault());
document.getElementById('canvas-outer').addEventListener('drop', e=>{
  e.preventDefault();
  const t=e.dataTransfer.getData('node-type');
  const label=e.dataTransfer.getData('node-label');
  const sub=e.dataTransfer.getData('node-sub');
  if(!t) return;
  const outer=document.getElementById('canvas-outer');
  const rect=outer.getBoundingClientRect();
  const x=e.clientX-rect.left+outer.scrollLeft-90;
  const y=e.clientY-rect.top+outer.scrollTop-30;
  addNode(x, y, t, label, sub);
});

/* ══════════════════════════════════════════════════════
   CONTEXT MENU
══════════════════════════════════════════════════════ */
document.getElementById('canvas-outer').addEventListener('contextmenu', e=>{
  e.preventDefault();
  const outer=document.getElementById('canvas-outer');
  const rect=outer.getBoundingClientRect();
  ctxPos={x:e.clientX-rect.left+outer.scrollLeft, y:e.clientY-rect.top+outer.scrollTop};
  const menu=document.getElementById('ctx-menu');
  menu.style.display='block';
  menu.style.left=e.clientX+'px';
  menu.style.top=e.clientY+'px';
});
document.addEventListener('click', ()=>{ document.getElementById('ctx-menu').style.display='none'; cancelConnect(); });
function ctxAddNode(){ document.getElementById('ctx-menu').style.display='none'; showAddModal(ctxPos.x, ctxPos.y); }
function ctxSelectAll(){ document.getElementById('ctx-menu').style.display='none'; showToast('Seleziona tutto — funzione multipla'); }

/* ══════════════════════════════════════════════════════
   ADD NODE MODAL
══════════════════════════════════════════════════════ */
function showAddModal(x,y){
  modalPos={x,y};
  modalNodeType='ac';
  document.getElementById('modal-body').innerHTML=`
    <div class="field-group">
      <label class="field-label">Nome nodo</label>
      <input class="field-input" id="mn-label" placeholder="es. Verifica Ordine" autofocus>
    </div>
    <div class="field-group">
      <label class="field-label">Operazione</label>
      <input class="field-input" id="mn-sub" placeholder="es. verify:record · ERP">
    </div>
    <div class="field-group">
      <label class="field-label">Tipo</label>
      <select class="field-select" id="mn-type" onchange="modalNodeType=this.value">
        ${Object.entries(TYPE_LABEL).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
      </select>
    </div>`;
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('mn-label')?.focus(),100);
}

function confirmAddNode(){
  const label=document.getElementById('mn-label')?.value;
  const sub=document.getElementById('mn-sub')?.value||'custom';
  const t=document.getElementById('mn-type')?.value||modalNodeType;
  addNode(modalPos.x, modalPos.y, t, label, sub);
  closeModal();
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('show'); }
document.getElementById('modal-overlay').addEventListener('click', e=>{ if(e.target===document.getElementById('modal-overlay')) closeModal(); });

/* ══════════════════════════════════════════════════════
   FLOWS / TABS
══════════════════════════════════════════════════════ */
function renderTabs(){
  const row=document.getElementById('tab-row');
  row.innerHTML='';
  flows.forEach((f,i)=>{
    const btn=document.createElement('button');
    btn.className='ftab'+(i===currentFlowIdx?' act':'');
    btn.textContent=f.name;
    btn.onclick=()=>{ currentFlowIdx=i; cancelConnect(); closeProps(); renderAll(); renderTabs(); };
    btn.oncontextmenu=e=>{ e.preventDefault(); if(flows.length>1){flows.splice(i,1);if(currentFlowIdx>=flows.length)currentFlowIdx=flows.length-1;renderAll();renderTabs();}};
    row.appendChild(btn);
  });
}

function addFlow(){
  const name=prompt('Nome del nuovo workflow:','Nuovo Flusso');
  if(!name) return;
  flows.push({id:'f'+Date.now(),name,nodes:[],edges:[]});
  currentFlowIdx=flows.length-1;
  cancelConnect(); closeProps();
  renderAll(); renderTabs();
  showToast('Nuovo workflow creato: '+name);
}

document.getElementById('flow-name').addEventListener('change', e=>{
  currentFlow().name=e.target.value;
  renderTabs();
});

/* ══════════════════════════════════════════════════════
   RUN / SAVE / UTILS
══════════════════════════════════════════════════════ */
function toggleRun(){
  running=!running;
  const btn=document.getElementById('run-btn');
  if(running){
    btn.innerHTML='<svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:#10B981;fill:none;stroke-width:2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>Stop';
    btn.classList.add('run-on');
    showToast('Simulazione avviata — le connessioni si animano');
  } else {
    btn.innerHTML='<svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2"><polygon points="5 3 19 12 5 21 5 3"/></svg>Run';
    btn.classList.remove('run-on');
  }
  renderAll();
}

function saveAll(){
  try {
    const data=JSON.stringify(flows);
    localStorage.setItem('smyb_flows',data);
    // Also offer download
    const blob=new Blob([data],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='SMYB_workflows_'+new Date().toISOString().slice(0,10)+'.json';
    a.click();
    showToast('Flussi salvati in locale e scaricati come JSON');
  } catch(e){ showToast('Errore salvataggio: '+e.message); }
}

function clearCanvas(){
  if(!confirm('Svuotare il canvas? I nodi del workflow corrente saranno eliminati.')) return;
  currentFlow().nodes=[];
  currentFlow().edges=[];
  closeProps(); cancelConnect();
  renderAll();
  showToast('Canvas svuotato');
}

function togglePalette(){
  document.getElementById('palette').classList.toggle('collapsed');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2200);
}

// Click on empty canvas to deselect
document.getElementById('canvas-outer').addEventListener('click', e=>{
  if(e.target===document.getElementById('canvas-outer')||e.target===document.getElementById('canvas')){
    closeProps(); cancelConnect();
    document.querySelectorAll('.wf-node').forEach(n=>n.classList.remove('sel'));
    selectedNodeId=null;
  }
});

// Load saved if exists
function loadSaved(){
  try{
    const saved=localStorage.getItem('smyb_flows');
    if(saved){ flows=JSON.parse(saved); return true; }
  }catch(e){}
  return false;
}

/* ══════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════ */
initDefaultFlows();
if(!loadSaved()) {} // use defaults
initPalette();
renderAll();
renderTabs();
</script>
</body>
</html>
