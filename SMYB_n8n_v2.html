<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SMYB Workflow Engine</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0f0f13;color:#e2e2e8;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ─────────────────────────────── */
#topbar{height:50px;background:#16161c;border-bottom:1px solid #25252e;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:100}
.brand{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#fff;letter-spacing:-.2px;white-space:nowrap;flex-shrink:0}
.brand-icon{width:28px;height:28px;background:linear-gradient(135deg,#5c4ec9,#7B68EE);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.divider{width:1px;height:20px;background:#25252e;flex-shrink:0}
.ftabs-wrap{flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.ftabs-wrap::-webkit-scrollbar{display:none}
.ftabs{display:flex;gap:3px;padding-right:8px}
.ftab{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid transparent;color:#555;background:transparent;font-family:inherit;transition:all .12s;white-space:nowrap;flex-shrink:0}
.ftab:hover{background:#1e1e26;color:#aaa}
.ftab.act{background:#1e1e26;border-color:#32323e;color:#e2e2e8;font-weight:500}
.run-btn{padding:6px 11px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:#4f3cc9;color:#fff;font-family:inherit;transition:background .12s;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0}
.run-btn:hover{background:#6b55e0}
.run-btn svg{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── LAYOUT ─────────────────────────────── */
#layout{flex:1;display:flex;overflow:hidden;position:relative}

/* ── CANVAS ─────────────────────────────── */
#canvas-outer{flex:1;overflow:auto;position:relative;background:#0f0f13;background-image:radial-gradient(circle,rgba(255,255,255,.055) 1px,transparent 1px);background-size:24px 24px;-webkit-overflow-scrolling:touch}
#canvas{position:relative}
#svg-layer{position:absolute;inset:0;pointer-events:none;overflow:visible}

/* ── SIDEBAR — desktop ───────────────────── */
#sidebar{width:280px;background:#13131a;border-left:1px solid #1e1e28;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .25s ease}
.sb-hdr{padding:16px 16px 12px;border-bottom:1px solid #1e1e28;position:relative}
.sb-pretitle{font-size:9px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:#383848;margin-bottom:5px}
.sb-title{font-size:14px;font-weight:600;color:#e2e2e8;margin-bottom:3px;line-height:1.3}
.sb-type{font-size:11px;color:#404055;display:flex;align-items:center;gap:5px}
.sb-type-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sb-body{padding:14px 16px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sb-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:10px}
.sb-empty svg{width:28px;height:28px;stroke:#222232;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.sb-empty p{font-size:12px;color:#2a2a3a;line-height:1.6}
.sb-desc{font-size:12px;color:#7070888;line-height:1.65;margin-bottom:12px;color:#787890}
.ops-hdr{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#33334a;margin-bottom:7px;margin-top:14px}
.ops-list{display:flex;flex-direction:column;gap:5px}
.op-item{display:flex;align-items:center;gap:8px;background:#191922;border:1px solid #22222e;border-radius:7px;padding:7px 10px;font-size:11px;color:#8a8aa0}
.op-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.kv-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid #191922;font-size:11px;gap:8px}
.kv-key{color:#404058;flex-shrink:0}
.kv-val{color:#8080a0;font-family:monospace;font-size:10px;text-align:right;word-break:break-all}
/* close btn — mobile only */
.sb-close{display:none;position:absolute;right:12px;top:14px;width:26px;height:26px;background:#1e1e28;border:none;border-radius:50%;color:#666;font-size:16px;cursor:pointer;line-height:26px;text-align:center}

/* ── NODES ──────────────────────────────── */
.wf-node{position:absolute;background:#1c1c24;border:1px solid #2c2c38;border-radius:10px;cursor:pointer;display:flex;align-items:center;padding:10px 12px 10px 10px;gap:9px;transition:border-color .14s,box-shadow .14s;z-index:10;user-select:none;-webkit-tap-highlight-color:transparent}
.wf-node:hover,.wf-node:active{border-color:#5a57c9;box-shadow:0 0 0 2px rgba(90,87,201,.2),0 6px 24px rgba(0,0,0,.5)}
.wf-node.sel{border-color:#4faaff;box-shadow:0 0 0 2px rgba(79,170,255,.2)}
.wf-node.agent{background:#181822;border-color:#2e2e44}
.wf-node.agent:hover,.wf-node.agent:active{border-color:#7B68EE;box-shadow:0 0 0 2px rgba(123,104,238,.22)}
.wf-node.agent.sel{border-color:#7B68EE;box-shadow:0 0 0 2px rgba(123,104,238,.28)}
.rf-badge{position:absolute;top:-9px;left:10px;background:#0d2240;border:1px solid #1a4a7a;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:600;color:#4faaff;letter-spacing:.3px;display:flex;align-items:center;gap:4px}
.rf-dot{width:5px;height:5px;background:#4faaff;border-radius:50%}
.node-icon{width:38px;height:38px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.node-icon svg{width:18px;height:18px;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;fill:none}
.node-text{flex:1;min-width:0}
.node-title{font-size:12px;font-weight:600;color:#dcdce4;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-sub{font-size:10px;color:#45455a;margin-top:2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.port{position:absolute;width:12px;height:12px;background:#0f0f13;border:2px solid #3a3a4e;border-radius:50%;top:50%;transform:translateY(-50%);z-index:20;transition:border-color .12s}
.wf-node:hover .port{border-color:#5a57c9}
.port-in{left:-7px}
.port-out{right:-7px}
.elabel{position:absolute;font-size:9px;color:#3a3a52;font-weight:600;letter-spacing:.3px;pointer-events:none;background:#0f0f13;padding:0 3px;z-index:5;text-transform:lowercase}

/* ── MOBILE BOTTOM SHEET ─────────────────── */
@media(max-width:768px){
  #sidebar{
    position:fixed;bottom:0;left:0;right:0;width:100%;
    height:320px;max-height:80dvh;
    border-left:none;border-top:1px solid #25252e;border-radius:16px 16px 0 0;
    transform:translateY(100%);
    z-index:200;box-shadow:0 -8px 32px rgba(0,0,0,.6);
  }
  #sidebar.open{transform:translateY(0)}
  .sb-close{display:block}
  #layout{flex-direction:column}
  #canvas-outer{flex:1;width:100%}
  .sb-hdr{padding:14px 40px 12px 16px}
  /* handle bar */
  .sb-hdr::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:36px;height:3px;background:#333344;border-radius:2px}
  /* dim overlay */
  #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
  #overlay.show{display:block}
}
@media(min-width:769px){
  #overlay{display:none!important}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#22222e;border-radius:3px}
</style>
</head>

/* ── RENDER ENGINE ──────────────────── */
let currentTab=0, running=false;
const canvas=document.getElementById('canvas');
const svg=document.getElementById('svg-layer');

function nodeById(tab,id){ return tab.nodes.find(n=>n.id===id); }
function portOut(n){ return {x:n.x+n.w, y:n.y+n.h/2}; }
function portIn(n){  return {x:n.x,     y:n.y+n.h/2}; }

function bezier(src,dst){
  const s=portOut(src), d=portIn(dst);
  const c=Math.min(Math.max(Math.abs(d.x-s.x)*.45,55),180);
  return `M${s.x} ${s.y} C${s.x+c} ${s.y} ${d.x-c} ${d.y} ${d.x} ${d.y}`;
}

function renderTab(ti){
  const tab=TABS[ti];
  canvas.style.width=tab.w+'px';
  canvas.style.height=tab.h+'px';
  svg.setAttribute('width',tab.w);
  svg.setAttribute('height',tab.h);
  svg.setAttribute('viewBox',`0 0 ${tab.w} ${tab.h}`);
  svg.innerHTML='';
  canvas.querySelectorAll('.wf-node,.elabel').forEach(e=>e.remove());
  closeSidebar();

  // Defs
  svg.innerHTML=`<defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker></defs>`;

  // Edges
  tab.edges.forEach((e,i)=>{
    const src=nodeById(tab,e.f), dst=nodeById(tab,e.t);
    if(!src||!dst) return;
    const d=bezier(src,dst);
    const pid=`p${ti}_${i}`;
    const col=e.suc?'#10B981':e.dashed?'#2e2e50':'#252535';
    const dash=e.dashed?'6 4':'none';

    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('id',pid);
    path.setAttribute('d',d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',col);
    path.setAttribute('stroke-width','1.8');
    path.setAttribute('stroke-dasharray',dash);
    path.setAttribute('marker-end','url(#ar)');
    svg.appendChild(path);

    if(e.lbl){
      const s=portOut(src),dst2=portIn(dst);
      const lbl=document.createElement('div');
      lbl.className='elabel';
      lbl.textContent=e.lbl;
      lbl.style.left=((s.x+dst2.x)/2-10)+'px';
      lbl.style.top=((s.y+dst2.y)/2-7)+'px';
      lbl.style.color=e.suc?'#10B981':'#353555';
      canvas.appendChild(lbl);
    }

    if(running){
      const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('r',e.dashed?'3.5':'4.5');
      dot.setAttribute('fill',e.suc?'#10B981':e.dashed?'#5a57c9':'#9C86FF');
      dot.setAttribute('opacity','0.92');
      const anim=document.createElementNS('http://www.w3.org/2000/svg','animateMotion');
      anim.setAttribute('dur',(1.5+i*.28)+'s');
      anim.setAttribute('repeatCount','indefinite');
      anim.setAttribute('begin',(i*.14)+'s');
      const mpath=document.createElementNS('http://www.w3.org/2000/svg','mpath');
      mpath.setAttributeNS('http://www.w3.org/1999/xlink','href','#'+pid);
      anim.appendChild(mpath);
      dot.appendChild(anim);
      svg.appendChild(dot);
    }
  });

  // Nodes
  tab.nodes.forEach(n=>{
    const el=document.createElement('div');
    el.className='wf-node'+(n.agent?' agent':'');
    el.dataset.id=n.id;
    el.style.cssText=`left:${n.x}px;top:${n.y}px;width:${n.w}px;height:${n.h}px`;
    const ic=n.t==='mem'?'mem':(n.agent?'agent':n.t);
    el.innerHTML=`
      ${n.agent?'<div class="rf-badge"><div class="rf-dot"></div>ReadyFlow</div>':''}
      <div class="port port-in"></div>
      <div class="node-icon ic-${n.agent?'agent':n.t}">
        <svg viewBox="0 0 24 24">${ICONS[ic]||ICONS.ac}</svg>
      </div>
      <div class="node-text">
        <div class="node-title">${n.label}</div>
        <div class="node-sub">${n.sub}</div>
      </div>
      <div class="port port-out"></div>`;
    el.addEventListener('click',()=>selectNode(n,el));
    canvas.appendChild(el);
  });
}

function selectNode(n,el){
  canvas.querySelectorAll('.wf-node').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  const col=TYPE_COLOR[n.t]||'#9C86FF';
  document.getElementById('sb-title').textContent=n.label;
  document.getElementById('sb-type').innerHTML=`<div class="sb-type-dot" style="background:${col}"></div>${TYPE_LABEL[n.t]||'Nodo'} · ${n.sub}`;
  let kv='',ops='';
  if(n.kv&&n.kv.length){
    kv='<div class="ops-hdr" style="margin-top:12px">Parametri</div>';
    n.kv.forEach(([k,v])=>{ kv+=`<div class="kv-row"><span class="kv-key">${k}</span><span class="kv-val">${v}</span></div>`; });
  }
  if(n.acts&&n.acts.length){
    ops='<div class="ops-hdr" style="margin-top:12px">Operazioni</div><div class="ops-list">';
    n.acts.forEach(a=>{ ops+=`<div class="op-item"><div class="op-dot" style="background:${col}"></div>${a}</div>`; });
    ops+='</div>';
  }
  document.getElementById('sb-body').innerHTML=`<div class="sb-desc">${n.detail||''}</div>${kv}${ops}`;
  // Open on mobile
  const sb=document.getElementById('sidebar');
  sb.classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  canvas.querySelectorAll('.wf-node').forEach(e=>e.classList.remove('sel'));
}

function setTab(i,btn){
  currentTab=i;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  renderTab(i);
}

function toggleRun(btn){
  running=!running;
  if(running){
    btn.innerHTML='<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>Stop';
    btn.style.background='#1a6040';
  } else {
    btn.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Run';
    btn.style.background='#4f3cc9';
  }
  renderTab(currentTab);
}

/* Init */
renderTab(0);

/* Scroll canvas to show agent node on load */
setTimeout(()=>{ document.getElementById('canvas-outer').scrollLeft=0; },100);
