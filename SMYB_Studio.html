<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SMYB Process & VSM Studio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0c0c10;color:#e2e2e8;height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* ── TOPBAR ────────────────────────────────────────── */
#topbar{height:48px;background:#14141a;border-bottom:1px solid #22222e;display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;z-index:200}
.brand{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#fff;white-space:nowrap;flex-shrink:0}
.brand-icon{width:26px;height:26px;background:linear-gradient(135deg,#5c4ec9,#7B68EE);border-radius:6px;display:flex;align-items:center;justify-content:center}
.brand-icon svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.sep{width:1px;height:18px;background:#22222e;flex-shrink:0;margin:0 2px}
.mode-tabs{display:flex;gap:2px;background:#0e0e16;border:1px solid #22222e;border-radius:7px;padding:2px;flex-shrink:0}
.mode-tab{padding:4px 12px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#444;font-family:inherit;transition:all .12s;white-space:nowrap}
.mode-tab:hover{color:#888}
.mode-tab.act{background:#1e1e2c;color:#e2e2e8}
.mode-tab.act.vsm{background:#0d2a1a;color:#10B981}
.flow-name{font-size:12px;font-weight:500;color:#606080;padding:4px 8px;border-radius:5px;cursor:text;border:1px solid transparent;background:transparent;font-family:inherit;min-width:110px}
.flow-name:focus{outline:none;border-color:#33334a;background:#1a1a24;color:#e2e2e8}
.tbtn-row{display:flex;gap:3px;flex:1;overflow-x:auto;scrollbar-width:none}
.tbtn-row::-webkit-scrollbar{display:none}
.ftab{padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid transparent;color:#444;background:transparent;font-family:inherit;white-space:nowrap;transition:all .1s}
.ftab:hover{background:#1a1a22;color:#aaa}
.ftab.act{background:#1e1e28;border-color:#30303e;color:#e2e2e8;font-weight:500}
.ftab-add{padding:4px 8px;border-radius:5px;font-size:12px;cursor:pointer;border:1px solid #25253a;color:#444;background:transparent;font-family:inherit}
.ftab-add:hover{color:#9C86FF;border-color:#4a4a70}
.top-actions{display:flex;gap:5px;flex-shrink:0;margin-left:auto}
.tbtn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #25252e;color:#707090;background:transparent;font-family:inherit;transition:all .1s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.tbtn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tbtn:hover{background:#1a1a24;color:#e2e2e8}
.tbtn.primary{background:#4f3cc9;border-color:#4f3cc9;color:#fff}
.tbtn.primary:hover{background:#6b55e0}
.tbtn.run-on{background:#1a3d28;border-color:#2a6040;color:#10B981}

/* ── LAYOUT ────────────────────────────────────────── */
#layout{flex:1;display:flex;overflow:hidden}

/* ── PALETTE ───────────────────────────────────────── */
#palette{width:190px;background:#11111a;border-right:1px solid #1e1e28;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .2s}
#palette.collapsed{width:0;border-right:none}
.pal-hdr{padding:10px 12px 8px;border-bottom:1px solid #1a1a24;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#30304a}
.pal-body{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin}
.pal-section-title{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#28284a;margin-bottom:5px;padding:0 2px;margin-top:10px}
.pal-section-title:first-child{margin-top:0}
.pal-node{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:7px;border:1px solid #1e1e2c;background:#15151e;cursor:grab;transition:all .12s;margin-bottom:3px}
.pal-node:hover{border-color:#3a3a58;background:#1c1c28;transform:translateX(2px)}
.pal-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pal-icon svg{width:14px;height:14px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.pal-label{font-size:11px;font-weight:500;color:#8080a0;line-height:1.2}
.pal-sub{font-size:9px;color:#383858;margin-top:1px}

/* ── CANVAS ────────────────────────────────────────── */
#canvas-outer{flex:1;overflow:auto;position:relative;-webkit-overflow-scrolling:touch}
#canvas-outer.bpm-bg{background:#0c0c10;background-image:radial-gradient(circle,rgba(255,255,255,.05) 1px,transparent 1px);background-size:24px 24px}
#canvas-outer.vsm-bg{background:#060e08;background-image:linear-gradient(rgba(16,185,129,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,.04) 1px,transparent 1px);background-size:40px 40px}
#canvas{position:relative;min-width:1400px;min-height:700px}
#svg-layer{position:absolute;inset:0;pointer-events:none;overflow:visible;width:100%;height:100%}
#conn-preview{position:absolute;inset:0;pointer-events:none;overflow:visible;width:100%;height:100%}
.empty-canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.empty-canvas p{font-size:13px;color:#1e1e30;line-height:1.8}

/* ── BPM NODES ─────────────────────────────────────── */
.wf-node{position:absolute;background:#1c1c24;border:1px solid #2c2c38;border-radius:10px;cursor:move;display:flex;flex-direction:column;align-items:stretch;z-index:10;transition:border-color .12s,box-shadow .12s;touch-action:none;min-width:170px}
.wf-node:hover{border-color:#4a47a0;box-shadow:0 0 0 1px rgba(90,87,180,.2),0 4px 20px rgba(0,0,0,.5)}
.wf-node.sel{border-color:#4faaff;box-shadow:0 0 0 2px rgba(79,170,255,.2)}
.wf-node.agent-node{background:#181822;border-color:#2a2a3e}
.wf-node.agent-node.sel{border-color:#7B68EE;box-shadow:0 0 0 2px rgba(123,104,238,.28)}
.wf-node.connecting-from{border-color:#9C86FF;box-shadow:0 0 0 2px rgba(156,134,255,.3)}
.node-main{display:flex;align-items:center;padding:9px 12px 9px 10px;gap:9px}
.rf-badge{position:absolute;top:-9px;left:10px;background:#0d2240;border:1px solid #1a4a7a;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:600;color:#4faaff;letter-spacing:.3px;display:flex;align-items:center;gap:4px;pointer-events:none;white-space:nowrap}
.rf-dot{width:5px;height:5px;background:#4faaff;border-radius:50%}
.node-icon{width:34px;height:34px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.node-icon svg{width:16px;height:16px;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;fill:none}
.node-text{flex:1;min-width:0}
.node-title{font-size:12px;font-weight:600;color:#dcdce4;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-sub{font-size:9px;color:#40405a;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* BPM metadata strip */
.node-meta{display:flex;align-items:center;gap:0;border-top:1px solid #22222e;overflow:hidden;border-radius:0 0 9px 9px}
.meta-chip{flex:1;display:flex;align-items:center;justify-content:center;gap:3px;padding:4px 3px;font-size:9px;font-weight:500;border-right:1px solid #22222e;cursor:default;white-space:nowrap;overflow:hidden}
.meta-chip:last-child{border-right:none}
.meta-chip svg{width:9px;height:9px;flex-shrink:0}
.exec-manual{color:#F59E0B;background:rgba(245,158,11,.07)}
.exec-semi{color:#5090F8;background:rgba(80,144,248,.07)}
.exec-auto{color:#10B981;background:rgba(16,185,129,.07)}
.exec-handheld{color:#9C86FF;background:rgba(156,134,255,.07)}
/* ports */
.port{position:absolute;width:13px;height:13px;background:#0c0c10;border:2px solid #3a3a50;border-radius:50%;top:50%;transform:translateY(-50%);z-index:30;cursor:crosshair;transition:border-color .1s,transform .1s}
.port:hover{border-color:#9C86FF;transform:translateY(-50%) scale(1.3)}
.port-in{left:-7px}
.port-out{right:-7px}
.node-del{position:absolute;top:-8px;right:-8px;width:18px;height:18px;background:#2a1a1a;border:1px solid #5a2020;border-radius:50%;color:#e05555;font-size:11px;line-height:17px;text-align:center;cursor:pointer;display:none;z-index:40}
.wf-node.sel .node-del{display:block}
.node-del:hover{background:#3a1a1a}
.elabel{position:absolute;font-size:9px;color:#333348;font-weight:600;letter-spacing:.3px;pointer-events:none;background:#0c0c10;padding:0 3px;z-index:5;text-transform:lowercase}

/* ── VSM NODES ─────────────────────────────────────── */
.vsm-node{position:absolute;cursor:move;z-index:10;touch-action:none}
.vsm-node.sel .vsm-del{display:block}
.vsm-del{position:absolute;top:-8px;right:-8px;width:18px;height:18px;background:#2a1a1a;border:1px solid #5a2020;border-radius:50%;color:#e05555;font-size:11px;line-height:17px;text-align:center;cursor:pointer;display:none;z-index:40}
/* VSM: process box */
.vsm-process{background:#0e1f14;border:1.5px solid #1a5a30;border-radius:6px;min-width:130px}
.vsm-proc-hdr{padding:7px 10px 6px;border-bottom:1px solid #1a5a30}
.vsm-proc-title{font-size:12px;font-weight:600;color:#5af098;line-height:1.3;text-align:center}
.vsm-proc-sub{font-size:9px;color:#2a6040;text-align:center;margin-top:2px}
.vsm-data-box{background:#061008;border-top:1px solid #1a5a30;padding:6px 8px;border-radius:0 0 5px 5px}
.vsm-kv{display:flex;justify-content:space-between;font-size:9px;padding:1px 0;border-bottom:1px solid #0e1e14}
.vsm-kv:last-child{border-bottom:none}
.vsm-kv-k{color:#2a5a38}
.vsm-kv-v{color:#4a9a68;font-family:monospace}
/* VSM: inventory */
.vsm-inv{text-align:center}
.vsm-inv svg{display:block;margin:0 auto}
.vsm-inv-label{font-size:10px;color:#F59E0B;margin-top:3px;font-weight:600}
.vsm-inv-sub{font-size:9px;color:#6a4a10}
/* VSM: supplier/customer */
.vsm-ext{background:#0e1828;border:1.5px solid #1a3a6a;border-radius:6px;padding:10px 14px;text-align:center;min-width:110px}
.vsm-ext-title{font-size:12px;font-weight:700;color:#4faaff}
.vsm-ext-sub{font-size:9px;color:#1a3a6a;margin-top:2px}
/* VSM: push arrow label */
.vsm-push{text-align:center}
.vsm-push svg{display:block;margin:0 auto}
.vsm-push-label{font-size:9px;color:#F59E0B;margin-top:2px;font-weight:600}
/* VSM: kaizen burst */
.vsm-kaizen text{font-size:10px;font-weight:700;fill:#FF784F;dominant-baseline:middle;text-anchor:middle}
/* VSM Timeline */
#vsm-timeline{position:absolute;bottom:0;left:0;right:0;height:90px;background:#060d08;border-top:2px solid #1a3a24;display:none;z-index:5;padding:0 20px}

/* ── PROPS PANEL ───────────────────────────────────── */
#props{width:265px;background:#11111a;border-left:1px solid #1e1e28;display:flex;flex-direction:column;flex-shrink:0;transition:width .2s,opacity .2s;overflow:hidden}
#props.hidden{width:0;border-left:none}
.props-hdr{padding:11px 14px 9px;border-bottom:1px solid #1a1a24;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.props-title{font-size:11px;font-weight:600;color:#e2e2e8}
.props-close{background:none;border:none;color:#444;cursor:pointer;font-size:16px;line-height:1}
.props-body{flex:1;overflow-y:auto;padding:12px 14px;scrollbar-width:thin}
.connect-hint{padding:8px 14px;font-size:11px;color:#303050;text-align:center;border-bottom:1px solid #1a1a24;line-height:1.5}
.connect-hint strong{color:#9C86FF}
.field-group{margin-bottom:12px}
.field-label{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#303050;margin-bottom:5px;display:block}
.field-input{width:100%;background:#181820;border:1px solid #252535;border-radius:6px;color:#e2e2e8;font-size:12px;padding:6px 9px;font-family:inherit;transition:border-color .1s;resize:none}
.field-input:focus{outline:none;border-color:#4a47a0}
.field-select{width:100%;background:#181820;border:1px solid #252535;border-radius:6px;color:#e2e2e8;font-size:12px;padding:6px 9px;font-family:inherit;cursor:pointer;appearance:none}
.field-select:focus{outline:none;border-color:#4a47a0}
.exec-picker{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.exec-opt{padding:6px 4px;border-radius:6px;border:1px solid #1e1e2c;background:#14141e;cursor:pointer;font-size:10px;font-weight:500;color:#404060;text-align:center;transition:all .1s;display:flex;flex-direction:column;align-items:center;gap:3px}
.exec-opt:hover{border-color:#3a3a58;color:#9090b0}
.exec-opt.sel{font-weight:600}
.type-picker{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.type-opt{padding:5px 6px;border-radius:6px;border:1px solid #1e1e2c;background:#14141e;cursor:pointer;font-size:10px;font-weight:500;color:#404060;text-align:center;transition:all .1s;display:flex;align-items:center;gap:4px;justify-content:center}
.type-opt:hover{border-color:#3a3a58;color:#9090b0}
.type-opt.selected{color:#fff;border-color:currentColor}
.props-actions{padding:10px 14px 14px;border-top:1px solid #1a1a24;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.btn-full{width:100%;padding:8px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid;font-family:inherit;transition:all .1s}
.btn-apply{background:#4f3cc9;border-color:#4f3cc9;color:#fff}
.btn-apply:hover{background:#6b55e0}
.btn-delete{background:transparent;border-color:#3a2020;color:#b05050}
.btn-delete:hover{background:#1e1010}

/* ── VSM TIMELINE ──────────────────────────────────── */
.tl-inner{display:flex;height:100%;align-items:flex-end;gap:0;padding-bottom:8px;overflow-x:auto}
.tl-step{display:flex;flex-direction:column;align-items:center;min-width:120px;flex:1}
.tl-bar-wrap{display:flex;gap:2px;margin-bottom:4px;width:100%;justify-content:center}
.tl-va{background:#10B981;border-radius:3px 3px 0 0;min-height:4px;width:28px}
.tl-nva{background:#e05555;border-radius:3px 3px 0 0;min-height:4px;width:28px}
.tl-label{font-size:9px;color:#2a5040;text-align:center;line-height:1.3}
.tl-total{font-size:9px;color:#404060;margin-top:2px}
.tl-legend{position:absolute;top:8px;right:20px;display:flex;gap:10px}
.tl-leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:#2a4040}
.tl-leg-dot{width:8px;height:8px;border-radius:2px}

/* ── MODAL ─────────────────────────────────────────── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center}
#modal-overlay.show{display:flex}
#modal{background:#1a1a24;border:1px solid #2e2e3e;border-radius:12px;padding:20px;width:320px;max-width:90vw;box-shadow:0 16px 48px rgba(0,0,0,.7)}
.modal-title{font-size:14px;font-weight:600;margin-bottom:14px;color:#e2e2e8}
.modal-body{display:flex;flex-direction:column;gap:10px}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-btn{flex:1;padding:8px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid;font-family:inherit}
.modal-cancel{background:transparent;border-color:#2e2e3e;color:#707090}
.modal-cancel:hover{background:#1e1e2c}
.modal-confirm{background:#4f3cc9;border-color:#4f3cc9;color:#fff}
.modal-confirm:hover{background:#6b55e0}

/* ── CONTEXT MENU ──────────────────────────────────── */
#ctx-menu{position:fixed;background:#1a1a24;border:1px solid #2e2e3e;border-radius:8px;padding:4px;z-index:1000;display:none;min-width:155px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.ctx-item{padding:7px 12px;font-size:12px;color:#9090a8;cursor:pointer;border-radius:5px;display:flex;align-items:center;gap:8px}
.ctx-item:hover{background:#252535;color:#e2e2e8}
.ctx-item svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.ctx-sep{height:1px;background:#22222e;margin:3px 0}
.ctx-item.danger{color:#c05050}
.ctx-item.danger:hover{background:#1e1010}

/* ── TOAST ─────────────────────────────────────────── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#252535;border:1px solid #35354a;border-radius:8px;padding:8px 16px;font-size:12px;color:#a0a0b8;z-index:2000;transition:transform .25s ease,opacity .25s;opacity:0;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e1e2c;border-radius:3px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="brand">
    <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
    SMYB Studio
  </div>
  <div class="sep"></div>
  <div class="mode-tabs">
    <button class="mode-tab act" id="tab-bpm" onclick="setMode('bpm')">⬡ BPM Flow</button>
    <button class="mode-tab vsm" id="tab-vsm" onclick="setMode('vsm')">◈ VSM</button>
  </div>
  <div class="sep"></div>
  <input class="flow-name" id="flow-name" value="Inbound Agent">
  <div class="sep"></div>
  <div class="tbtn-row" id="tab-row"></div>
  <button class="ftab-add" onclick="addFlow()">+ Flusso</button>
  <div class="sep"></div>
  <div class="top-actions">
    <button class="tbtn" id="run-btn" onclick="toggleRun()">
      <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Run
    </button>
    <button class="tbtn" onclick="togglePalette()">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
    <button class="tbtn" onclick="clearCanvas()">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
    </button>
    <button class="tbtn primary" onclick="saveAll()">
      <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Salva
    </button>
  </div>
</div>

<!-- LAYOUT -->
<div id="layout">
  <div id="palette">
    <div class="pal-hdr" id="pal-hdr">Nodi BPM</div>
    <div class="pal-body" id="pal-body"></div>
  </div>

  <div id="canvas-outer" class="bpm-bg">
    <svg id="conn-preview"></svg>
    <div id="canvas">
      <svg id="svg-layer"></svg>
    </div>
    <div class="empty-canvas" id="empty-msg">
      <p>Trascina un nodo dalla palette<br>o clic destro per aggiungerne uno</p>
    </div>
    <div id="vsm-timeline">
      <div class="tl-legend">
        <div class="tl-leg-item"><div class="tl-leg-dot" style="background:#10B981"></div>VA (valore)</div>
        <div class="tl-leg-item"><div class="tl-leg-dot" style="background:#e05555"></div>NVA (spreco)</div>
      </div>
      <div class="tl-inner" id="tl-inner"></div>
    </div>
  </div>

  <div id="props" class="hidden">
    <div class="props-hdr">
      <span class="props-title" id="props-title">Proprietà</span>
      <button class="props-close" onclick="closeProps()">×</button>
    </div>
    <div class="connect-hint" id="conn-hint">Clicca <strong>○</strong> output → poi <strong>○</strong> input destinazione</div>
    <div class="props-body" id="props-body"></div>
    <div class="props-actions" id="props-actions"></div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx-menu">

function portOut(n){return{x:n.x+n.w,y:n.y+n.h/2};}
function portIn(n){return{x:n.x,y:n.y+n.h/2};}
function bezier(s,d){const c=Math.min(Math.max(Math.abs(d.x-s.x)*.45,55),180);return`M${s.x} ${s.y} C${s.x+c} ${s.y} ${d.x-c} ${d.y} ${d.x} ${d.y}`;}

function execChip(n){
  const e=EXEC_TYPES.find(x=>x.k===n.exec)||EXEC_TYPES[0];
  const cls='exec-'+e.k;
  const ownerStr=n.owner?`<span style="flex:2;text-align:center;font-size:9px;color:#404060;overflow:hidden;text-overflow:ellipsis">${n.owner}</span>`:'';
  const timeStr=n.time?`<span style="flex:1;text-align:center;color:#353555;font-size:9px">${n.time}</span>`:'';
  return `<div class="node-meta">
    <div class="meta-chip ${cls}">

function renderBPM(){

    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;
  flow.edges.forEach((e,i)=>{

    sh+=`<path id="${pid}" d="${bezier(s,d)}" fill="none" stroke="${col}" stroke-width="1.8" marker-end="url(#ar)"/>`;

      <animateMotion dur="${1.4+i*.25}s" repeatCount="indefinite" begin="${i*.12}s"><mpath href="#${pid}"/></animateMotion></circle>`;}

  flow.nodes.forEach(n=>{

/* ════════════════════════════════════════════════════
   RENDER VSM
════════════════════════════════════════════════════ */
function renderVSM(){
  const flow=vsmFlows[currentIdx];
  if(!flow){return;}
  document.getElementById('flow-name').value=flow.name;
  const canvas=document.getElementById('canvas');
  const svgL=document.getElementById('svg-layer');
  canvas.querySelectorAll('.vsm-node').forEach(e=>e.remove());
  svgL.innerHTML='';
  document.getElementById('empty-msg').style.display=flow.nodes.length===0?'block':'none';

  // Build SVG connections (process→process horizontal push arrows as SVG)
  const procs=flow.nodes.filter(n=>n.vt==='process').sort((a,b)=>a.x-b.x);
  let sh=`<defs>
    <marker id="push-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9Z" fill="#F59E0B"/></marker>
    <marker id="info-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9Z" fill="#4faaff"/></marker>
  </defs>`;
  // Draw horizontal push arrows between processes
  for(let i=0;i<procs.length-1;i++){
    const a=procs[i],b=procs[i+1];
    const x1=a.x+150,x2=b.x,y=a.y+38;
    sh+=`<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#push-arr)" stroke-dasharray="6 3"/>`;
  }
  // Draw info flow arc on top (supplier→first process, last process→customer)
  if(procs.length>0){
    const sup=flow.nodes.find(n=>n.vt==='supplier');
    const cust=flow.nodes.find(n=>n.vt==='customer');
    if(sup&&procs[0]){
      const sx=sup.x+120,sy=sup.y+30,dx=procs[0].x,dy=procs[0].y+30;
      sh+=`<path d="M${sx} ${sy} C${sx+60} ${sy-30} ${dx-60} ${dy-30} ${dx} ${dy}" fill="none" stroke="#4faaff" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#info-arr)"/>`;
    }
    if(cust&&procs[procs.length-1]){
      const lp=procs[procs.length-1];
      const sx=lp.x+150,sy=lp.y+30,dx=cust.x,dy=cust.y+30;
      sh+=`<path d="M${sx} ${sy} C${sx+60} ${sy-30} ${dx-60} ${dy-30} ${dx} ${dy}" fill="none" stroke="#4faaff" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#info-arr)"/>`;
    }
  }
  svgL.innerHTML=sh;

  // Render nodes
  flow.nodes.forEach(n=>{
    const el=document.createElement('div');
    el.className='vsm-node'+(n.id===selId?' sel':'');
    el.dataset.id=n.id;
    el.style.position='absolute';
    el.style.left=n.x+'px';
    el.style.top=n.y+'px';
    el.innerHTML=buildVSMNode(n);
    const delBtn=document.createElement('div');
    delBtn.className='vsm-del';delBtn.textContent='×';
    delBtn.onclick=e=>{e.stopPropagation();deleteVSMNode(n.id);};
    el.appendChild(delBtn);
    el.addEventListener('click',e=>{e.stopPropagation();selId=n.id;renderAll();openVSMProps(n);});
    attachVSMDrag(el,n); canvas.appendChild(el);
  });

  // Timeline
  renderTimeline(flow);
}

        <path d="M2 15 L48 15" stroke="#F59E0B" stroke-width="2.5"/>
        <polygon points="45,8 58,15 45,22" fill="#F59E0B"/>

      <div style="font-size:9px;color:#F59E0B;font-weight:600">PUSH</div>

  if(n.vt==='truck'){

function renderTimeline(flow){
  const tl=document.getElementById('tl-inner');
  const procs=flow.nodes.filter(n=>n.vt==='process').sort((a,b)=>a.x-b.x);
  const invs=flow.nodes.filter(n=>n.vt==='inventory').sort((a,b)=>a.x-b.x);
  if(procs.length===0){tl.innerHTML='';return;}
  const maxH=50;
  let html='';
  // interleave inv + proc
  for(let i=0;i<procs.length;i++){
    const inv=invs[i];
    if(inv){
      const m=inv.time||'';
      const t=parseFloat(m)||20;
      const h=Math.min(t*0.6,maxH);
      html+=`<div class="tl-step"><div class="tl-bar-wrap"><div class="tl-nva" style="height:${h}px"></div></div>
        <div class="tl-label">${inv.label||'WIP'}</div>
        <div class="tl-total" style="color:#e05555">${m}</div></div>`;
    }
    const p=procs[i];
    const ctStr=p.ct||'30 min';
    const ctVal=parseFloat(ctStr)||30;
    const pct=ctStr.includes('ore')?ctVal*60:ctVal;
    const ph=Math.min(pct*.3,maxH);
    html+=`<div class="tl-step"><div class="tl-bar-wrap"><div class="tl-va" style="height:${ph}px"></div></div>
      <div class="tl-label">${p.label}</div>
      <div class="tl-total">${ctStr}</div></div>`;
  }
  tl.innerHTML=html;
}

/* ════════════════════════════════════════════════════
   BPM DRAG & CONNECT
════════════════════════════════════════════════════ */
function attachBPM(el,n){
  el.addEventListener('pointerdown',e=>{
    if(e.target.classList.contains('port')||e.target.classList.contains('node-del'))return;
    e.stopPropagation();
    selId=n.id;
    document.querySelectorAll('.wf-node').forEach(x=>x.classList.toggle('sel',x.dataset.id===n.id));
    openBPMProps(n);
    const outer=document.getElementById('canvas-outer');
    const rect=el.getBoundingClientRect();
    dragState={id:n.id,ox:e.clientX-rect.left,oy:e.clientY-rect.top};
    el.setPointerCapture(e.pointerId);
    outer.style.overflow='hidden';
  });
  el.addEventListener('pointermove',e=>{
    if(!dragState||dragState.id!==n.id)return;
    const outer=document.getElementById('canvas-outer');
    const or=outer.getBoundingClientRect();
    n.x=Math.max(0,e.clientX-or.left-dragState.ox+outer.scrollLeft);
    n.y=Math.max(0,e.clientY-or.top-dragState.oy+outer.scrollTop);
    n.x=Math.round(n.x);n.y=Math.round(n.y);
    el.style.left=n.x+'px';el.style.top=n.y+'px';
    redrawEdges();
  });
  el.addEventListener('pointerup',()=>{
    if(dragState&&dragState.id===n.id){dragState=null;document.getElementById('canvas-outer').style.overflow='auto';}
  });
  el.querySelectorAll('.port').forEach(p=>{
    p.addEventListener('click',e=>{
      e.stopPropagation();
      const nid=p.dataset.nid,side=p.dataset.side;
      if(!connectFrom){
        if(side==='out'){connectFrom=nid;el.classList.add('connecting-from');showToast('Ora clicca la porta ○ di ingresso del nodo destinazione');}
      } else {
        if(side==='in'&&nid!==connectFrom){addEdge(connectFrom,nid);}
        cancelConnect();
      }
    });
  });
  el.querySelector('.node-del').addEventListener('click',e=>{e.stopPropagation();deleteNode(n.id);});
}

/* ════════════════════════════════════════════════════
   VSM DRAG
════════════════════════════════════════════════════ */
function attachVSMDrag(el,n){
  el.addEventListener('pointerdown',e=>{
    if(e.target.classList.contains('vsm-del'))return;
    e.stopPropagation();
    const outer=document.getElementById('canvas-outer');
    const rect=el.getBoundingClientRect();
    dragState={id:n.id,ox:e.clientX-rect.left,oy:e.clientY-rect.top,vsm:true};
    el.setPointerCapture(e.pointerId);
    outer.style.overflow='hidden';
  });
  el.addEventListener('pointermove',e=>{
    if(!dragState||dragState.id!==n.id||!dragState.vsm)return;
    const outer=document.getElementById('canvas-outer');
    const or=outer.getBoundingClientRect();
    n.x=Math.max(0,Math.round(e.clientX-or.left-dragState.ox+outer.scrollLeft));
    n.y=Math.max(0,Math.round(e.clientY-or.top-dragState.oy+outer.scrollTop));
    el.style.left=n.x+'px';el.style.top=n.y+'px';
    renderVSM(); // redraw SVG arcs
  });
  el.addEventListener('pointerup',()=>{
    if(dragState&&dragState.id===n.id){dragState=null;document.getElementById('canvas-outer').style.overflow='auto';}
  });
}

/* connect preview */
document.getElementById('canvas-outer').addEventListener('mousemove',e=>{
  if(!connectFrom||mode!=='bpm')return;
  const outer=document.getElementById('canvas-outer');
  const r=outer.getBoundingClientRect();
  const mx=e.clientX-r.left+outer.scrollLeft,my=e.clientY-r.top+outer.scrollTop;
  const src=flows[currentIdx].nodes.find(n=>n.id===connectFrom);
  if(!src)return;
  const s=portOut(src);
  const c=Math.max(Math.abs(mx-s.x)*.45,55);
  document.getElementById('conn-preview').innerHTML=`<path d="M${s.x} ${s.y} C${s.x+c} ${s.y} ${mx-c} ${my} ${mx} ${my}" fill="none" stroke="#9C86FF" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7"/>
    <circle cx="${mx}" cy="${my}" r="4" fill="#9C86FF" opacity="0.6"/>`;
});

function cancelConnect(){
  connectFrom=null;
  document.querySelectorAll('.wf-node.connecting-from').forEach(e=>e.classList.remove('connecting-from'));
  document.getElementById('conn-preview').innerHTML='';
}

/* ════════════════════════════════════════════════════
   ADD / DELETE
════════════════════════════════════════════════════ */
function addNode(x,y,t,label,sub){
  const id='n'+Date.now();
  const isAgent=t==='agent';
  const n={id,x:Math.round(x),y:Math.round(y),w:isAgent?235:180,t,label:label||TL[t]||'Nodo',sub:sub||'custom',detail:'',agent:isAgent,owner:'',time:'',exec:'manual'};
  flows[currentIdx].nodes.push(n);
  renderAll();selId=id;
  setTimeout(()=>{openBPMProps(n);},50);
  showToast('Nodo aggiunto');
}

function addVSMNode(x,y,vt,label){
  const id='v'+Date.now();
  const n={id,x:Math.round(x),y:Math.round(y),vt,label:label||vt,sub:'',ct:'30 min',co:'5 min',fte:'1',uptime:'90%',exec:'manual'};
  vsmFlows[currentIdx].nodes.push(n);
  renderAll();selId=id;
  setTimeout(()=>{openVSMProps(n);},50);
  showToast('Elemento VSM aggiunto');
}

function deleteNode(id){
  const f=flows[currentIdx];
  f.nodes=f.nodes.filter(n=>n.id!==id);
  f.edges=f.edges.filter(e=>e.f!==id&&e.t!==id);
  if(selId===id)closeProps();
  renderAll();showToast('Nodo eliminato');
}

function deleteVSMNode(id){
  vsmFlows[currentIdx].nodes=vsmFlows[currentIdx].nodes.filter(n=>n.id!==id);
  if(selId===id)closeProps();
  renderAll();showToast('Elemento eliminato');
}

function addEdge(fromId,toId){
  const f=flows[currentIdx];
  if(f.edges.find(e=>e.f===fromId&&e.t===toId))return;
  f.edges.push({id:'e'+Date.now(),f:fromId,t:toId,lbl:'',suc:false});
  renderAll();showToast('Connessione creata');
}

/* ════════════════════════════════════════════════════
   PROPERTIES PANEL — BPM
════════════════════════════════════════════════════ */
function openBPMProps(n){
  document.getElementById('props').classList.remove('hidden');
  document.getElementById('props-title').textContent='Proprietà nodo';
  const ep=EXEC_TYPES.map(e=>`
    <div class="exec-opt ${n.exec===e.k?'sel':''}" data-exec="${e.k}"
      style="${n.exec===e.k?`background:${e.color}18;border-color:${e.color};color:${e.color}`:''}"
      onclick="pickExec(this,'${e.k}')">
      <span style="font-size:14px">${e.icon}</span>${e.label}
    </div>`).join('');
  const tpOpts=Object.entries(TL).map(([k,v])=>`
    <div class="type-opt ${n.t===k?'selected':''}" data-t="${k}"
      style="${n.t===k?`color:${TC[k]||'#9C86FF'};border-color:${TC[k]||'#9C86FF'}`:''}"
      onclick="pickType(this,'${k}')">
      <svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2">${ICONS[k]||ICONS.ac}</svg>${v}
    </div>`).join('');
  document.getElementById('props-body').innerHTML=`
    <div class="field-group"><label class="field-label">Nome</label>
      <input class="field-input" id="pf-label" value="${n.label}"></div>
    <div class="field-group"><label class="field-label">Operazione</label>
      <input class="field-input" id="pf-sub" value="${n.sub}"></div>
    <div class="field-group"><label class="field-label">Tipo nodo</label>
      <div class="type-picker" id="type-picker">${tpOpts}</div></div>
    <div class="field-group"><label class="field-label">Responsabile</label>
      <input class="field-input" id="pf-owner" value="${n.owner||''}" placeholder="es. Capobaia, AI, Dispatcher"></div>
    <div class="field-group"><label class="field-label">Tempo stimato</label>
      <input class="field-input" id="pf-time" value="${n.time||''}" placeholder="es. 15 min, 2 ore"></div>
    <div class="field-group"><label class="field-label">Tipo esecuzione</label>
      <div class="exec-picker" id="exec-picker">${ep}</div></div>
    <div class="field-group"><label class="field-label">Descrizione / note</label>
      <textarea class="field-input" id="pf-detail" rows="3">${n.detail||''}</textarea></div>
    <div class="field-group"><label class="field-label" style="display:flex;align-items:center;gap:6px;cursor:pointer">
      <input type="checkbox" id="pf-agent" ${n.agent?'checked':''} style="accent-color:#9C86FF">
      Badge ReadyFlow Agent</label></div>`;
  document.getElementById('props-actions').innerHTML=`
    <button class="btn-full btn-apply" onclick="applyBPM('${n.id}')">✓ Applica</button>
    <button class="btn-full btn-delete" onclick="deleteNode('${n.id}')">Elimina nodo</button>`;
}

function pickExec(el,k){
  document.querySelectorAll('.exec-opt').forEach(o=>{
    o.classList.remove('sel');o.style.background='';o.style.borderColor='';o.style.color='';
  });
  const e=EXEC_TYPES.find(x=>x.k===k);
  el.classList.add('sel');el.style.background=e.color+'18';el.style.borderColor=e.color;el.style.color=e.color;
  el.dataset.selExec=k;
}
function pickType(el,t){
  document.querySelectorAll('.type-opt').forEach(o=>{o.classList.remove('selected');o.style.color='';o.style.borderColor='';});
  el.classList.add('selected');el.style.color=TC[t]||'#9C86FF';el.style.borderColor=TC[t]||'#9C86FF';
}

function applyBPM(id){
  const n=flows[currentIdx].nodes.find(x=>x.id===id);
  if(!n)return;
  n.label=document.getElementById('pf-label').value||n.label;
  n.sub=document.getElementById('pf-sub').value;
  n.owner=document.getElementById('pf-owner').value;
  n.time=document.getElementById('pf-time').value;
  n.detail=document.getElementById('pf-detail').value;
  n.agent=document.getElementById('pf-agent').checked;
  const selExec=document.querySelector('.exec-opt.sel');
  if(selExec) n.exec=selExec.dataset.exec||selExec.dataset.selExec||n.exec;
  const selType=document.querySelector('.type-opt.selected');
  if(selType) n.t=selType.dataset.t||n.t;
  renderAll();openBPMProps(n);showToast('Modifiche applicate');
}

/* ════════════════════════════════════════════════════
   PROPERTIES PANEL — VSM
════════════════════════════════════════════════════ */
function openVSMProps(n){
  document.getElementById('props').classList.remove('hidden');
  document.getElementById('props-title').textContent='Proprietà VSM';
  let fields='';
  fields+=`<div class="field-group"><label class="field-label">Nome</label><input class="field-input" id="vf-label" value="${n.label||''}"></div>`;
  fields+=`<div class="field-group"><label class="field-label">Sottotitolo</label><input class="field-input" id="vf-sub" value="${n.sub||''}"></div>`;
  if(n.vt==='process'){
    const ep=EXEC_TYPES.map(e=>`<div class="exec-opt ${n.exec===e.k?'sel':''}" data-exec="${e.k}" style="${n.exec===e.k?`background:${e.color}18;border-color:${e.color};color:${e.color}`:''}" onclick="pickExec(this,'${e.k}')">${e.icon} ${e.label}</div>`).join('');
    fields+=`<div class="field-group"><label class="field-label">Cycle Time (C/T)</label><input class="field-input" id="vf-ct" value="${n.ct||''}"></div>`;
    fields+=`<div class="field-group"><label class="field-label">Changeover (C/O)</label><input class="field-input" id="vf-co" value="${n.co||''}"></div>`;
    fields+=`<div class="field-group"><label class="field-label">Operatori / FTE</label><input class="field-input" id="vf-fte" value="${n.fte||''}"></div>`;
    fields+=`<div class="field-group"><label class="field-label">Uptime</label><input class="field-input" id="vf-uptime" value="${n.uptime||''}"></div>`;
    fields+=`<div class="field-group"><label class="field-label">Tipo esecuzione</label><div class="exec-picker">${ep}</div></div>`;
  }
  if(n.vt==='inventory'){
    fields+=`<div class="field-group"><label class="field-label">Quantità WIP</label><input class="field-input" id="vf-qty" value="${n.qty||''}"></div>`;
    fields+=`<div class="field-group"><label class="field-label">Tempo attesa (NVA)</label><input class="field-input" id="vf-time" value="${n.time||''}"></div>`;
  }
  if(n.vt==='supplier'||n.vt==='customer'){
    fields+=`<div class="field-group"><label class="field-label">Volume / Quantità</label><input class="field-input" id="vf-qty" value="${n.qty||''}"></div>`;
    fields+=`<div class="field-group"><label class="field-label">Frequenza</label><input class="field-input" id="vf-freq" value="${n.freq||''}"></div>`;
  }
  document.getElementById('props-body').innerHTML=fields;
  document.getElementById('props-actions').innerHTML=`
    <button class="btn-full btn-apply" onclick="applyVSM('${n.id}')">✓ Applica</button>
    <button class="btn-full btn-delete" onclick="deleteVSMNode('${n.id}')">Elimina elemento</button>`;
}

function applyVSM(id){
  const n=vsmFlows[currentIdx].nodes.find(x=>x.id===id);
  if(!n)return;
  const g=id=>document.getElementById(id);
  if(g('vf-label'))n.label=g('vf-label').value;
  if(g('vf-sub'))n.sub=g('vf-sub').value;
  if(g('vf-ct'))n.ct=g('vf-ct').value;
  if(g('vf-co'))n.co=g('vf-co').value;
  if(g('vf-fte'))n.fte=g('vf-fte').value;
  if(g('vf-uptime'))n.uptime=g('vf-uptime').value;
  if(g('vf-qty'))n.qty=g('vf-qty').value;
  if(g('vf-time'))n.time=g('vf-time').value;
  if(g('vf-freq'))n.freq=g('vf-freq').value;
  const selExec=document.querySelector('.exec-opt.sel');
  if(selExec)n.exec=selExec.dataset.exec||selExec.dataset.selExec||n.exec;
  renderAll();openVSMProps(n);showToast('Modifiche applicate');
}

function closeProps(){
  document.getElementById('props').classList.add('hidden');
  selId=null;
  document.querySelectorAll('.wf-node,.vsm-node').forEach(e=>e.classList.remove('sel'));
}

/* ════════════════════════════════════════════════════
   PALETTE
════════════════════════════════════════════════════ */
function initPalette(){
  const body=document.getElementById('pal-body');
  body.innerHTML='';
  const items=mode==='bpm'?BPM_PAL:VSM_PAL;
  items.forEach(sec=>{
    const st=document.createElement('div');
    st.className='pal-section-title';st.textContent=sec.s;body.appendChild(st);
    sec.items.forEach(item=>{
      const d=document.createElement('div');d.className='pal-node';d.draggable=true;
      if(mode==='bpm'){
        const col=TC[item.t]||'#555';
        d.innerHTML=`<div class="pal-icon" style="background:${col}22"><svg viewBox="0 0 24 24" style="stroke:${col};fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round">${ICONS[item.icon]||ICONS.ac}</svg></div>
          <div><div class="pal-label">${item.label}</div><div class="pal-sub">${item.sub}</div></div>`;
        d.addEventListener('dragstart',e=>{e.dataTransfer.setData('nt',item.t);e.dataTransfer.setData('nl',item.label);e.dataTransfer.setData('ns',item.sub);});
      } else {
        const vColors={supplier:'#4faaff',customer:'#10B981',process:'#5af098',inventory:'#F59E0B',push:'#F59E0B',truck:'#F59E0B',kaizen:'#FF784F',pull:'#9C86FF'};
        const col=vColors[item.vt]||'#555';
        d.innerHTML=`<div class="pal-icon" style="background:${col}22"><span style="font-size:14px;color:${col}">${item.vt==='supplier'?'↗':item.vt==='customer'?'↘':item.vt==='process'?'⬡':item.vt==='inventory'?'△':item.vt==='kaizen'?'✦':item.vt==='push'?'→':'◈'}</span></div>
          <div><div class="pal-label">${item.label}</div><div class="pal-sub">${item.sub}</div></div>`;
        d.addEventListener('dragstart',e=>{e.dataTransfer.setData('vt',item.vt);e.dataTransfer.setData('nl',item.label);});
      }
      body.appendChild(d);
    });
  });
}

document.getElementById('canvas-outer').addEventListener('dragover',e=>e.preventDefault());
document.getElementById('canvas-outer').addEventListener('drop',e=>{
  e.preventDefault();
  const outer=document.getElementById('canvas-outer');
  const r=outer.getBoundingClientRect();
  const x=e.clientX-r.left+outer.scrollLeft-90,y=e.clientY-r.top+outer.scrollTop-30;
  if(mode==='bpm'){
    const t=e.dataTransfer.getData('nt'),l=e.dataTransfer.getData('nl'),s=e.dataTransfer.getData('ns');
    if(t)addNode(x,y,t,l,s);
  } else {
    const vt=e.dataTransfer.getData('vt'),l=e.dataTransfer.getData('nl');
    if(vt)addVSMNode(x,y,vt,l);
  }
});

/* ════════════════════════════════════════════════════
   FLOWS / TABS
════════════════════════════════════════════════════ */
function renderTabs(){
  const row=document.getElementById('tab-row');
  row.innerHTML='';
  const list=mode==='bpm'?flows:vsmFlows;
  list.forEach((f,i)=>{
    const btn=document.createElement('button');
    btn.className='ftab'+(i===currentIdx?' act':'');
    btn.textContent=f.name;
    btn.onclick=()=>{currentIdx=i;cancelConnect();closeProps();renderAll();renderTabs();};
    btn.oncontextmenu=e=>{e.preventDefault();if(list.length>1){list.splice(i,1);if(currentIdx>=list.length)currentIdx=list.length-1;renderAll();renderTabs();}};
    row.appendChild(btn);
  });
}

function addFlow(){
  const name=prompt(mode==='bpm'?'Nome del workflow:':'Nome della Value Stream:',mode==='bpm'?'Nuovo Flusso':'Nuova VSM');
  if(!name)return;
  if(mode==='bpm') flows.push({id:'f'+Date.now(),name,nodes:[],edges:[]});
  else vsmFlows.push({id:'v'+Date.now(),name,nodes:[]});
  currentIdx=(mode==='bpm'?flows:vsmFlows).length-1;
  cancelConnect();closeProps();renderAll();renderTabs();showToast('Creato: '+name);
}

document.getElementById('flow-name').addEventListener('change',e=>{
  cf().name=e.target.value;renderTabs();
});

/* ════════════════════════════════════════════════════
   CONTEXT MENU
════════════════════════════════════════════════════ */
document.getElementById('canvas-outer').addEventListener('contextmenu',e=>{
  e.preventDefault();
  const outer=document.getElementById('canvas-outer');
  const r=outer.getBoundingClientRect();
  ctxPos={x:e.clientX-r.left+outer.scrollLeft,y:e.clientY-r.top+outer.scrollTop};
  const m=document.getElementById('ctx-menu');
  m.style.display='block';m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';
});
document.addEventListener('click',()=>{document.getElementById('ctx-menu').style.display='none';});
function ctxAdd(){document.getElementById('ctx-menu').style.display='none';showAddModal(ctxPos.x,ctxPos.y);}

/* ════════════════════════════════════════════════════
   ADD MODAL
════════════════════════════════════════════════════ */
function showAddModal(x,y){
  modalPos={x,y};
  document.getElementById('modal-title').textContent=mode==='bpm'?'Nuovo nodo BPM':'Nuovo elemento VSM';
  if(mode==='bpm'){
    document.getElementById('modal-body').innerHTML=`
      <div class="field-group"><label class="field-label">Nome</label><input class="field-input" id="mn-label" placeholder="Nome nodo" autofocus></div>
      <div class="field-group"><label class="field-label">Operazione</label><input class="field-input" id="mn-sub" placeholder="es. verify:record"></div>
      <div class="field-group"><label class="field-label">Tipo</label>
        <select class="field-select" id="mn-type">${Object.entries(TL).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></div>`;
  } else {
    document.getElementById('modal-body').innerHTML=`
      <div class="field-group"><label class="field-label">Nome</label><input class="field-input" id="mn-label" placeholder="Nome elemento" autofocus></div>
      <div class="field-group"><label class="field-label">Tipo VSM</label>
        <select class="field-select" id="mn-vtype">
          <option value="process">Processo</option>
          <option value="inventory">Inventario / WIP</option>
          <option value="supplier">Fornitore</option>
          <option value="customer">Cliente</option>
          <option value="kaizen">Kaizen Burst</option>
          <option value="push">Push Arrow</option>
          <option value="truck">Trasporto</option>
        </select></div>`;
  }
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('mn-label')?.focus(),80);
}

function confirmAdd(){
  const label=document.getElementById('mn-label')?.value;
  if(mode==='bpm'){
    const t=document.getElementById('mn-type')?.value||'ac';
    const s=document.getElementById('mn-sub')?.value||'custom';
    addNode(modalPos.x,modalPos.y,t,label,s);
  } else {
    const vt=document.getElementById('mn-vtype')?.value||'process';
    addVSMNode(modalPos.x,modalPos.y,vt,label);
  }
  closeModal();
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});

/* ════════════════════════════════════════════════════
   MISC
════════════════════════════════════════════════════ */
function toggleRun(){
  running=!running;
  const btn=document.getElementById('run-btn');
  if(running){btn.innerHTML='<svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:#10B981;fill:none;stroke-width:2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>Stop';btn.classList.add('run-on');}
  else{btn.innerHTML='<svg viewBox="0 0 24 24" style="width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2"><polygon points="5 3 19 12 5 21 5 3"/></svg>Run';btn.classList.remove('run-on');}
  renderAll();
}

function togglePalette(){document.getElementById('palette').classList.toggle('collapsed');}

function clearCanvas(){
  if(!confirm('Svuotare il canvas?'))return;
  if(mode==='bpm'){flows[currentIdx].nodes=[];flows[currentIdx].edges=[];}
  else{vsmFlows[currentIdx].nodes=[];}
  closeProps();cancelConnect();renderAll();showToast('Canvas svuotato');
}

function saveAll(){
  try{
    const data={bpm:flows,vsm:vsmFlows};
    localStorage.setItem('smyb_studio',JSON.stringify(data));
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='SMYB_Studio_'+new Date().toISOString().slice(0,10)+'.json';a.click();
    showToast('Salvato — file JSON scaricato');
  }catch(e){showToast('Errore: '+e.message);}
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

document.getElementById('canvas-outer').addEventListener('click',e=>{
  if(e.target===document.getElementById('canvas-outer')||e.target===document.getElementById('canvas')){
    closeProps();cancelConnect();selId=null;
    document.querySelectorAll('.wf-node,.vsm-node').forEach(n=>n.classList.remove('sel'));
  }
});

/* ════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════ */
function loadSaved(){
  try{const d=localStorage.getItem('smyb_studio');if(d){const p=JSON.parse(d);if(p.bpm)flows=p.bpm;if(p.vsm)vsmFlows=p.vsm;return true;}}catch(e){}return false;
}

initData();
loadSaved();
initPalette();
renderTabs();
renderAll();
</script>
</body>
</html>
